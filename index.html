<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
	<title>Q-It | Pickleball Open Play Stacking Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1 id="displaySessionName">Pickleball Open Play</h1>
            <div id="sessionHeader">
                <span class="badge">Total Registered Players: <span id="playerCount">0</span></span>
            </div>
        </header>

        <section class="admin-panel" id="adminPanel">
            <div class="setup-row" id="setupControls">
                <div class="input-group">
                    <label>Session Name:</label>
                    <input type="text" id="sessionNameInput" placeholder="e.g. Saturday Smash">
                </div>
                <div class="input-group">
                    <label>Courts:</label>
                    <input type="number" id="courtCountInput" value="4" min="1">
                </div>
                <button onclick="startSession()" class="btn-start">Start Session</button>
            </div>
            
            <div id="sessionControls" style="display:none;">
                <button onclick="endSession()" class="btn-end">End Session & Report</button>
            </div>

            <textarea id="playerInput" placeholder="Paste players here (e.g., Krisha Sy ab)"></textarea>
            <button class="btn-add" onclick="populatePlayers()">Add to Queue</button>
        </section>

        <section id="finalReport" class="admin-panel" style="display:none;"></section>

        <div class="main-layout" id="activeUI">
            <section class="courts-grid" id="courts"></section>

            <div class="data-flex-container">
                <aside class="stats-section">
                    <h3>Live Queue</h3>
                    <table id="statsTable">
                        <thead>
                            <tr>
                                <th>Player (Level)</th>
                                <th>Games</th>
                                <th>W - L</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="statsBody"></tbody>
                    </table>

                    <h3 style="margin-top: 32px;">Removed Players Log</h3>
                    <div id="removalLog" class="log-container"></div>
                </aside>

                <aside class="history-section">
                    <h3>Leaderboard</h3>
                    <table class="compact-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Player</th>
                                <th>Wins</th>
                                <th>%</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboardBody"></tbody>
                    </table>

                    <h3 style="margin-top: 24px;">Match History</h3>
                    <div id="matchLog" class="log-container"></div>
                </aside>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
